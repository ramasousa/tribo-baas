<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Dashboard Executivo · Bradesco as a Service</title>
<style>
:root{
  --red:#CC092F;--rd:#900F15;--ink:#0B0E18;--bg:#F7F5F2;--card:#fff;
  --g900:#14161F;--g600:#4B5065;--g400:#9CA3AF;--g200:#E4E1DC;--g100:#F0EDE8;
  --gA:#CC092F;--gAf:#FBE9EC;--gB:#4F46E5;--gBf:#EEEDFC;
  --gC:#1A8754;--gCf:#E8F5EE;--gR:#0EA5E9;--gRf:#E0F2FE;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --serif:Georgia,'Times New Roman',serif;--mono:'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--g600);-webkit-font-smoothing:antialiased;min-height:100vh}

/* HEADER */
.dash-header{background:var(--ink);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.dash-logo{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:700;font-size:15px;color:#fff}
.dash-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:rgba(255,255,255,.5)}
.dash-sync{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.5)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22C55E}
.dash-tag{background:rgba(204,9,47,.3);color:#FCA5A5;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.06em}

/* MAIN */
.dash-main{max-width:1320px;margin:0 auto;padding:28px 32px 64px}
@media(max-width:768px){.dash-main{padding:20px 16px 48px}}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
@media(max-width:960px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--card);border:1px solid var(--g200);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--red))}
.kpi-n{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:4px}
.kpi-l{font-size:12px;color:var(--g400);letter-spacing:.03em}
.kpi-sub{font-size:11px;color:var(--g400);margin-top:6px;display:flex;align-items:center;gap:5px}
.kpi-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}
.kpi-alert{background:#FEE2E2;color:#991B1B}
.kpi-ok{background:#D1FAE5;color:#065F46}
.kpi-warn{background:#FEF3C7;color:#92400E}

/* SECTION HEADERS */
.dash-section{margin-bottom:28px}
.dash-section-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.dash-section-head h2{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--ink)}
.dash-section-head span{font-size:11px;color:var(--g400);font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* SQUAD HEALTH GRID */
.health-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.health-card{border-radius:10px;padding:12px 14px;border:1px solid transparent;cursor:default;transition:transform .15s}
.health-card:hover{transform:translateY(-2px)}
.hc-id{font-family:var(--mono);font-size:11px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.hc-name{font-size:11.5px;color:var(--ink);font-weight:600;line-height:1.3;margin-bottom:8px}
.hc-meta{display:flex;align-items:center;justify-content:space-between;font-size:10px}
.hc-alloc{font-weight:700}
.health-ok{background:#D1FAE5;border-color:#A7F3D0}
.health-warn{background:#FEF9C3;border-color:#FDE68A}
.health-gap{background:#FEE2E2;border-color:#FECACA}
.health-neutral{background:var(--g100);border-color:var(--g200)}
.health-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#10B981}
.dot-warn{background:#F59E0B}
.dot-gap{background:#EF4444}
.dot-neutral{background:#9CA3AF}
.group-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--g400);margin:14px 0 6px;grid-column:1/-1}

/* RISK MATRIX */
.matrix-wrap{background:var(--card);border:1px solid var(--g200);border-radius:14px;padding:20px;display:inline-block;width:100%}
.matrix-grid{display:grid;grid-template-columns:auto repeat(3,1fr);grid-template-rows:repeat(3,1fr) auto;gap:6px}
.matrix-cell{background:var(--g100);border-radius:8px;padding:10px;min-height:72px;position:relative;display:flex;flex-direction:column;gap:4px}
.mc-critico{background:#FEE2E2}
.mc-alto{background:#FEF3C7}
.mc-medio{background:#EFF6FF}
.mc-baixo{background:#F0FDF4}
.matrix-label{font-size:9.5px;font-weight:700;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;writing-mode:vertical-rl;text-orientation:mixed;display:flex;align-items:center;justify-content:center;padding:4px}
.matrix-label-h{font-size:9.5px;font-weight:700;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:4px}
.risk-dot{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.risk-dot-critico{background:#991B1B}
.risk-dot-alto{background:#DC2626}
.risk-dot-medio{background:#D97706}
.risk-dot-baixo{background:#059669}

/* ALLOCATION CHART */
.alloc-wrap{background:var(--card);border:1px solid var(--g200);border-radius:14px;padding:20px}
.alloc-chart{display:flex;align-items:flex-end;gap:16px;height:120px;padding:0 8px}
.alloc-bar-group{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.alloc-bars{display:flex;gap:4px;align-items:flex-end;height:100px}
.bar{border-radius:4px 4px 0 0;min-width:16px;transition:height .3s}
.bar-planned{opacity:.3}
.alloc-group-label{font-size:10px;font-weight:700;text-align:center}
.alloc-numbers{font-size:10px;color:var(--g400);text-align:center}
.alloc-legend{display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--g400)}
.alloc-legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px}

/* GRID 2COL */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:960px){.grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.grid-3{grid-template-columns:1fr}}

/* STRATEGIC MINI CARDS */
.strat-mini{background:linear-gradient(135deg,#0D0F1A 0%,#1a0a10 60%,#0D0F1A 100%);border-radius:12px;padding:18px 20px;margin-bottom:10px}
.strat-mini-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#A78BFA;margin-bottom:6px}
.strat-mini-title{font-family:var(--serif);font-size:14px;color:#fff;font-weight:700;line-height:1.3;margin-bottom:10px}
.strat-mini-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.strat-mini-col{background:rgba(255,255,255,.06);border-radius:7px;padding:8px 10px}
.strat-mini-col-label{font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.strat-mini-col.before .strat-mini-col-label{color:#FCA5A5}
.strat-mini-col.after .strat-mini-col-label{color:#86EFAC}
.strat-mini-col ul{list-style:none;font-size:10.5px;color:rgba(255,255,255,.65);line-height:1.7}
.strat-mini-col li{padding-left:10px;position:relative}
.strat-mini-col.before li::before{content:'✕';position:absolute;left:0;color:#FCA5A5;font-size:8px}
.strat-mini-col.after li::before{content:'✓';position:absolute;left:0;color:#86EFAC;font-size:8px}

/* EXT DEP SUMMARY */
.ext-dep-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100)}
.ext-dep-row:last-child{border-bottom:none}
.imp-badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:100px;flex-shrink:0}
.imp-alto{background:#FEE2E2;color:#991B1B}
.imp-medio{background:#FEF3C7;color:#92400E}
.imp-baixo{background:#D1FAE5;color:#065F46}

/* TEAM MINI */
.team-mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.team-mini-card{background:var(--card);border:1px solid var(--g200);border-radius:10px;padding:12px;border-top:3px solid var(--tc,var(--g200))}
.tm-role{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;display:inline-block;margin-bottom:8px}
.tm-name{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:2px}
.tm-title{font-size:11px;color:var(--g400);line-height:1.4}
.tm-squad{font-size:10px;font-family:var(--mono);color:var(--g400);margin-top:5px}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--g400);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--g200);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.login-wrap{min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:36px 32px;width:100%;max-width:380px}
.login-box h1{font-family:var(--serif);font-size:22px;color:#fff;margin-bottom:6px}
.login-box p{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px}
.login-input{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:13.5px;font-family:var(--sans);margin-bottom:10px}
.login-input::placeholder{color:rgba(255,255,255,.3)}
.login-input:focus{outline:none;border-color:rgba(204,9,47,.6)}
.login-btn-full{width:100%;padding:11px;border-radius:9px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-top:6px}
.login-err{font-size:12px;color:#FCA5A5;margin-top:8px;text-align:center;min-height:16px}

/* FOOTER */
.dash-footer{text-align:center;font-size:11.5px;color:var(--g400);padding:20px;border-top:1px solid var(--g200);margin-top:20px}
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-box">
      <h1>Dashboard Executivo</h1>
      <p>Bradesco as a Service · Visão executiva da Tribo</p>
      <input class="login-input" id="d-email" type="email" placeholder="seu.nome@bradesco.com.br" autocomplete="email"/>
      <input class="login-input" id="d-pass" type="password" placeholder="Senha" autocomplete="current-password"/>
      <button class="login-btn-full" onclick="dashLogin()">Entrar →</button>
      <div class="login-err" id="d-err"></div>
    </div>
  </div>
</div>

<div id="dash-app" style="display:none">
  <header class="dash-header">
    <div class="dash-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M5 11.5L12 3l7 8.5" stroke="#CC092F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3.5 15L12 6.5l8.5 8.5" stroke="#CC092F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
        <path d="M9.5 15.5v5.5M14.5 15.5v5.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Bradesco as a Service
    </div>
    <div class="dash-meta">
      <span class="dash-tag">DASHBOARD EXECUTIVO</span>
      <div class="dash-sync"><span class="sync-dot" id="sync-dot" style="background:#9CA3AF"></span><span id="sync-label">Conectando...</span></div>
      <span id="dash-user" style="font-size:11.5px"></span>
      <a onclick="dashLogout()" style="cursor:pointer;color:rgba(255,255,255,.35);font-size:12px">Sair</a>
    </div>
  </header>

  <main class="dash-main" id="dash-main">
    <div class="loading"><div class="spinner"></div>Carregando dados da Tribo...</div>
  </main>

  <footer class="dash-footer">
    Bradesco as a Service · Dashboard Executivo · <span id="dash-footer-user"></span>
    · <a href="/" style="color:var(--g400)">Voltar ao documento completo</a>
  </footer>
</div>

<script>
const FB={
  apiKey:'AIzaSyAa3uxYyktTJC7o_CIx0RBFObWcxCPjzso',
  projectId:'realtime-database-61af7',
  dbURL:'https://realtime-database-61af7-default-rtdb.firebaseio.com'
};
let fbToken=null,dashUser='',dashData={squads:[],groups:{},members:[],risks:[],strategicCards:[],externalDeps:[],tools:[]},sseConn=null;

// ── AUTH ─────────────────────────────────────────────────────────────
async function fbSignIn(){
  const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB.apiKey}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({returnSecureToken:true})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  fbToken=d.idToken;return fbToken;
}
async function fbGet(path){
  const r=await fetch(`${FB.dbURL}/${path}.json?auth=${fbToken}`);
  const d=await r.json();if(d&&d.error)throw new Error(d.error);return d;
}
function normArr(v,def){
  if(!v) return def||[];
  if(Array.isArray(v)) return v;
  return Object.values(v).filter(x=>x&&typeof x==='object');
}
function normStr(v,def){
  if(!v) return def||[];
  if(Array.isArray(v)) return v;
  return Object.values(v).filter(x=>typeof x==='string');
}

async function dashLogin(){
  const email=document.getElementById('d-email').value.trim().toLowerCase();
  const err=document.getElementById('d-err');
  if(!email.endsWith('@bradesco.com.br')&&!email.endsWith('@bradesco.com')){
    err.textContent='Apenas emails @bradesco.com.br são permitidos.';return;
  }
  const btn=document.querySelector('.login-btn-full');btn.textContent='Entrando...';btn.disabled=true;
  try{
    await fbSignIn();
    const state=await fbGet('state');
    if(state&&state.squads) loadState(state);
    dashUser=email;
    sessionStorage.setItem('dash_user',email);
    showDash();
    startSSE();
  }catch(e){err.textContent='Erro ao conectar: '+e.message;}
  btn.textContent='Entrar →';btn.disabled=false;
}
function dashLogout(){
  sessionStorage.removeItem('dash_user');
  if(sseConn){sseConn.close();sseConn=null;}
  document.getElementById('dash-app').style.display='none';
  document.getElementById('login-screen').style.display='';
}
function loadState(state){
  const nA=v=>normArr(v);
  const nS=v=>normStr(v);
  const nAStr=v=>{if(!v)return[];if(Array.isArray(v))return v;return Object.values(v).filter(x=>typeof x==='string');}
  dashData.squads=nA(state.squads).map(s=>({...s,
    capabilities:nAStr(s.capabilities),scope:nAStr(s.scope),
    risks:nAStr(s.risks),premises:nAStr(s.premises),
    dependencies:Array.isArray(s.dependencies)?s.dependencies:Object.values(s.dependencies||{})}));
  dashData.groups=state.groups||DEFAULT_GROUPS;
  dashData.members=nA(state.members);
  dashData.risks=nA(state.risks);
  dashData.strategicCards=nA(state.strategicCards);
  dashData.externalDeps=nA(state.externalDeps);
  dashData.tools=nA(state.tools);
}
function showDash(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dash-app').style.display='';
  document.getElementById('dash-user').textContent=dashUser;
  document.getElementById('dash-footer-user').textContent=dashUser;
  renderDash();
}
function startSSE(){
  if(sseConn){sseConn.close();}
  sseConn=new EventSource(`${FB.dbURL}/state.json?auth=${fbToken}`);
  sseConn.addEventListener('put',e=>{
    try{const msg=JSON.parse(e.data);if(msg.data&&msg.data.squads){loadState(msg.data);renderDash();setSyncBadge(true,msg.data.lastBy,msg.data.lastAt);}}catch{}
  });
  sseConn.onerror=()=>{setSyncBadge(false);setTimeout(startSSE,8000);};
  setSyncBadge(true,'',new Date().toISOString());
}
function setSyncBadge(ok,by,at){
  const dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-label');
  if(!dot)return;
  dot.style.background=ok?'#22C55E':'#EF4444';
  const t=at?new Date(at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
  lbl.textContent=ok?('Sync '+(t||'')):'Sem conexão';
}

const DEFAULT_GROUPS={
  A:{name:'Developer Portal',color:'#CC092F',faint:'#FBE9EC'},
  B:{name:'Produtos de Crédito',color:'#4F46E5',faint:'#EEEDFC'},
  C:{name:'White Label BaaS',color:'#1A8754',faint:'#E8F5EE'},
  R:{name:'Run — Operação',color:'#0EA5E9',faint:'#E0F2FE'}
};
const ROLE_COLORS={TTL:'#A78BFA',TPL:'#34D399',AC:'#60A5FA',DIR:'#F87171',SUPESR:'#FBBF24',SUPE:'#FB923C',TL:'#22D3EE',PM:'#4ADE80',ENG:'#94A3B8',OUTRO:'#CBD5E1'};
const ROLE_FAINT={TTL:'rgba(167,139,250,.15)',TPL:'rgba(52,211,153,.15)',AC:'rgba(96,165,250,.15)',DIR:'rgba(248,113,113,.15)',SUPESR:'rgba(251,191,36,.15)',SUPE:'rgba(251,146,60,.15)',TL:'rgba(34,211,238,.15)',PM:'rgba(74,222,128,.15)',ENG:'rgba(148,163,184,.15)',OUTRO:'rgba(203,213,225,.15)'};

// ── RENDER ────────────────────────────────────────────────────────────
function renderDash(){
  const {squads,groups,members,risks,strategicCards,externalDeps}=dashData;
  const gm=g=>groups[g]||DEFAULT_GROUPS[g]||{color:'#6B6F80',faint:'#F0F0F0'};

  // KPIs
  const totalPeople=squads.reduce((a,s)=>a+(parseInt(s.people)||0),0);
  const allocMembers=members.filter(m=>m.squadId&&squads.find(s=>s.id===m.squadId)).length;
  const criticalRisks=(risks.length?risks:DEFAULT_RISKS).filter(r=>
    (r.probability==='alta'&&(r.impact==='alto'||r.impact==='medio'))||(r.probability==='media'&&r.impact==='alto')).length;
  const totalSquads=squads.length;
  const totalGroups=Object.keys(groups).length;
  const extHigh=(externalDeps.length?externalDeps:DEFAULT_EXT).filter(e=>e.impact==='alto').length;

  const allocPct=totalPeople>0?Math.round(allocMembers/totalPeople*100):0;

  // Build squad health
  const squadHealth=squads.map(s=>{
    const allocated=members.filter(m=>m.squadId===s.id).length;
    const planned=parseInt(s.people)||8;
    const hasHighRisk=(risks.length?risks:DEFAULT_RISKS).some(r=>
      (r.owner===s.id)&&(r.probability==='alta'||r.impact==='alto')&&r.status==='aberto');
    let status='neutral';
    if(allocated>=planned&&!hasHighRisk) status='ok';
    else if(allocated>0&&allocated<planned) status='warn';
    else if(allocated===0&&planned>0) status='gap';
    return {...s,allocated,planned,status,hasHighRisk};
  });

  // Risk matrix
  const riskData=risks.length?risks:DEFAULT_RISKS;
  const matrixCells={
    alta_alto:[],alta_medio:[],alta_baixo:[],
    media_alto:[],media_medio:[],media_baixo:[],
    baixa_alto:[],baixa_medio:[],baixa_baixo:[]
  };
  riskData.forEach(r=>{
    const key=`${r.probability}_${r.impact}`;
    if(matrixCells[key]) matrixCells[key].push(r);
  });
  const matrixScore=(p,i)=>{const pm={alta:3,media:2,baixa:1};const im={alto:3,medio:2,baixo:1};return (pm[p]||1)*(im[i]||1);};
  const cellClass=(p,i)=>{const s=matrixScore(p,i);return s>=6?'mc-critico':s>=4?'mc-alto':s>=2?'mc-medio':'mc-baixo';};
  const dotClass=(p,i)=>{const s=matrixScore(p,i);return s>=6?'risk-dot-critico':s>=4?'risk-dot-alto':s>=2?'risk-dot-medio':'risk-dot-baixo';};

  // Alloc bars
  const groupOrder=['A','B','C','R',...Object.keys(groups).filter(g=>!['A','B','C','R'].includes(g))];
  const allocBars=groupOrder.map(g=>{
    const gs=squads.filter(s=>s.group===g);
    const planned=gs.reduce((a,s)=>a+(parseInt(s.people)||0),0);
    const allocated=members.filter(m=>gs.find(s=>s.id===m.squadId)).length;
    const m=gm(g);
    return {g,planned,allocated,name:m.name,color:m.color};
  }).filter(b=>b.planned>0);
  const maxPeople=Math.max(...allocBars.map(b=>b.planned),1);

  // Strategic cards
  const stratData=strategicCards.length?strategicCards:DEFAULT_STRATEGIC;
  const extData=externalDeps.length?externalDeps:DEFAULT_EXT;

  const html=`
  <div style="margin-bottom:24px">
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);margin-bottom:8px">
      VISÃO EXECUTIVA · TRIBO BRADESCO AS A SERVICE
    </div>
    <h1 style="font-family:var(--serif);font-size:clamp(22px,3vw,34px);font-weight:700;color:var(--ink);line-height:1.1">
      ${totalSquads} squads. ${totalGroups} grupos. Uma tribo.
    </h1>
  </div>

  <div class="kpi-row">
    ${kpiCard(totalSquads,'Squads','var(--red)','')}
    ${kpiCard('~'+totalPeople,'Pessoas planejadas','#4F46E5','')}
    ${kpiCard(members.length,'Membros cadastrados','#1A8754',
      `<span class="kpi-badge ${allocPct>=60?'kpi-ok':allocPct>=30?'kpi-warn':'kpi-alert'}">${allocPct}% alocado</span>`)}
    ${kpiCard(criticalRisks,'Riscos críticos/altos','#DC2626',
      `<span class="kpi-badge ${criticalRisks===0?'kpi-ok':criticalRisks<=2?'kpi-warn':'kpi-alert'}">${criticalRisks===0?'Tudo ok':criticalRisks+' abertos'}</span>`)}
    ${kpiCard(extHigh,'Deps externas — alto impacto','#D97706','')}
  </div>

  <div class="grid-2" style="margin-bottom:20px;align-items:start">
    <div class="dash-section">
      <div class="dash-section-head"><h2>Saúde das Squads</h2><span>por alocação e riscos</span></div>
      <div class="health-grid">
        ${groupOrder.flatMap(g=>{
          const gs=squadHealth.filter(s=>s.group===g);
          if(!gs.length) return [];
          const m=gm(g);
          return [`<div class="group-label" style="color:${m.color}">${g} · ${m.name}</div>`,
            ...gs.map(s=>`<div class="health-card health-${s.status}" title="${s.name}">
            <div class="hc-id">
              <span class="health-dot dot-${s.status}"></span>
              <span style="font-family:var(--mono);font-weight:700;font-size:11px">${s.id}</span>
            </div>
            <div class="hc-name">${s.name.substring(0,22)}</div>
            <div class="hc-meta">
              <span class="hc-alloc" style="color:${s.status==='gap'?'#DC2626':s.status==='warn'?'#D97706':'#059669'}">${s.allocated}/${s.planned}</span>
              <span style="font-size:9px;color:var(--g400)">${s.methodology}</span>
            </div>
          </div>`)];
        }).join('')}
      </div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:10.5px;color:var(--g400)">
        <span>🟢 Alocado</span><span>🟡 Parcial</span><span>🔴 Sem membros</span><span>⚪ Neutro</span>
      </div>
    </div>

    <div>
      <div class="dash-section">
        <div class="dash-section-head"><h2>Matriz de Riscos</h2><span>probabilidade × impacto</span></div>
        <div class="matrix-wrap">
          <div class="matrix-grid">
            <div></div>
            <div class="matrix-label-h">Baixo impacto</div>
            <div class="matrix-label-h">Médio impacto</div>
            <div class="matrix-label-h">Alto impacto</div>
            ${['alta','media','baixa'].map(p=>`
              <div class="matrix-label" style="writing-mode:vertical-rl;font-size:9px;color:var(--g400);font-weight:700;letter-spacing:.06em;text-transform:uppercase">${p==='alta'?'Alta prob.':p==='media'?'Média prob.':'Baixa prob.'}</div>
              ${['baixo','medio','alto'].map(i=>{
                const key=`${p}_${i}`;
                const risks=matrixCells[key]||[];
                return `<div class="matrix-cell ${cellClass(p,i)}">
                  ${risks.map(r=>`<span class="risk-dot ${dotClass(p,i)}" title="${r.title}">${r.id.replace('r','')}</span>`).join('')}
                  ${risks.length===0?'<span style="font-size:9px;color:var(--g400);opacity:.5">—</span>':''}
                </div>`;
              }).join('')}
            `).join('')}
          </div>
          <div style="margin-top:10px;font-size:10px;color:var(--g400)">Passe o mouse sobre os pontos para ver o risco.</div>
        </div>
      </div>

      <div class="dash-section" style="margin-top:20px">
        <div class="dash-section-head"><h2>Alocação por Grupo</h2><span>planejado vs cadastrado</span></div>
        <div class="alloc-wrap">
          <div class="alloc-chart">
            ${allocBars.map(b=>{
              const hp=Math.round((b.planned/maxPeople)*100);
              const ha=Math.round((b.allocated/maxPeople)*100);
              return `<div class="alloc-bar-group">
                <div class="alloc-bars">
                  <div class="bar bar-planned" style="height:${hp}px;background:${b.color};width:20px"></div>
                  <div class="bar" style="height:${ha}px;background:${b.color};width:20px"></div>
                </div>
                <div class="alloc-group-label" style="color:${b.color}">${b.g}</div>
                <div class="alloc-numbers">${b.allocated}/${b.planned}</div>
              </div>`;
            }).join('')}
          </div>
          <div class="alloc-legend">
            <span><span class="alloc-legend-dot" style="background:#6B6F80;opacity:.3"></span>Planejado</span>
            <span><span class="alloc-legend-dot" style="background:#6B6F80"></span>Cadastrado</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid-2" style="align-items:start">
    <div class="dash-section">
      <div class="dash-section-head"><h2>Argumentos Estratégicos</h2></div>
      ${stratData.map(s=>`<div class="strat-mini">
        <div class="strat-mini-eyebrow">${s.eyebrow||''}</div>
        <div class="strat-mini-title">${s.title||''}</div>
        <div class="strat-mini-cols">
          <div class="strat-mini-col before">
            <div class="strat-mini-col-label">${(s.before||{}).label||'Antes'}</div>
            <ul>${((s.before||{}).items||[]).slice(0,4).map(i=>`<li>${i}</li>`).join('')}</ul>
          </div>
          <div class="strat-mini-col after">
            <div class="strat-mini-col-label">${(s.after||{}).label||'Depois'}</div>
            <ul>${((s.after||{}).items||[]).slice(0,4).map(i=>`<li>${i}</li>`).join('')}</ul>
          </div>
        </div>
      </div>`).join('')}
    </div>

    <div>
      <div class="dash-section">
        <div class="dash-section-head"><h2>Dependências Externas</h2><span>fora do controle da tribo</span></div>
        <div style="background:var(--card);border:1px solid var(--g200);border-radius:12px;padding:16px">
          ${extData.map(e=>`<div class="ext-dep-row">
            <span class="imp-badge imp-${e.impact}">${e.impact}</span>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700;color:var(--ink)">${e.name}</div>
              <div style="font-size:11px;color:var(--g400)">${e.category} · Squads: ${(e.squads||[]).join(', ')}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>

      <div class="dash-section" style="margin-top:20px">
        <div class="dash-section-head"><h2>Team Members</h2></div>
        <div class="team-mini-grid">
          ${members.map(m=>{
            const sq=dashData.squads.find(s=>s.id===m.squadId);
            const g=sq?sq.group:'';
            const gm_=gm(g);
            const rc=ROLE_COLORS[m.role]||ROLE_COLORS.OUTRO;
            const rf=ROLE_FAINT[m.role]||ROLE_FAINT.OUTRO;
            return `<div class="team-mini-card" style="--tc:${gm_.color}">
              <span class="tm-role" style="background:${rf};color:${rc}">${m.role}</span>
              <div class="tm-name">${m.name||'(a definir)'}</div>
              <div class="tm-title">${m.title||''}</div>
              ${sq?`<div class="tm-squad">${sq.id} · ${sq.name.substring(0,16)}</div>`:''}
            </div>`;
          }).join('')||'<div style="color:var(--g400);font-size:13px">Nenhum membro cadastrado.</div>'}
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('dash-main').innerHTML=html;
}

function kpiCard(n,label,color,sub){
  return `<div class="kpi-card" style="--kpi-color:${color}">
    <div class="kpi-n">${n}</div>
    <div class="kpi-l">${label}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:''}
  </div>`;
}

const DEFAULT_RISKS=[
  {id:'r1',title:'Specs OpenAPI desatualizadas',probability:'alta',impact:'alto',status:'aberto',owner:'A2'},
  {id:'r2',title:'Chave de LLM exposta',probability:'media',impact:'alto',status:'aberto',owner:'A3'},
  {id:'r3',title:'Breaking change no MFE',probability:'media',impact:'alto',status:'aberto',owner:'C1'},
  {id:'r4',title:'Protocolo Build×Run',probability:'alta',impact:'medio',status:'aberto',owner:'R1'},
];
const DEFAULT_STRATEGIC=[
  {id:'s1',eyebrow:'⚡ Independência de plataforma',
   title:'Axway hoje limita o ritmo de inovação.',
   before:{label:'Hoje — com Axway',items:['Roadmap depende do vendor','IA, MCP e gRPC fora do escopo']},
   after:{label:'Com esta proposta',items:['Roadmap controlado pela tribo','MCP, gRPC e IA nativos']}}
];
const DEFAULT_EXT=[
  {id:'ext1',name:'BACEN / Open Finance',category:'Regulatório',impact:'alto',squads:['B3','B2']},
  {id:'ext2',name:'Aarin',category:'Parceiro',impact:'alto',squads:['C1','C2']},

];

// ── INIT ─────────────────────────────────────────────────────────────
async function init(){
  const user=sessionStorage.getItem('dash_user');
  if(user){
    dashUser=user;
    try{
      await fbSignIn();
      const state=await fbGet('state');
      if(state&&state.squads) loadState(state);
      showDash();
      startSSE();
    }catch(e){
      showDash(); // show with defaults
    }
  } else {
    document.getElementById('login-screen').style.display='';
  }
}

document.getElementById('d-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('d-pass').focus();});
document.getElementById('d-pass').addEventListener('keydown',e=>{if(e.key==='Enter')dashLogin();});

init();
</script>
